name: Build and Push Docker

on:
  push:
    branches: [ "dev" ]

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t ghcr.io/wchiways/resin_socks:latest .

      - name: Push image
        run: docker push ghcr.io/wchiways/resin_socks:latest